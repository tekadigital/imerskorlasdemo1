        // ==========================================

        // Mock State Database for Preview Mode
        let mockDB = {
            users: [
                { id: "U001", hp: "081122334455", pin: "123456", name: "Drs. Hermawan Baskoro", role: "SUPER_ADMIN", school: "SDIT Al-Hikmah Bandung", classId: "ALL" },
                { id: "U002", hp: "082233445566", pin: "123456", name: "Bunda Rania Amalia", role: "KOMITE", school: "SDIT Al-Hikmah Bandung", classId: "ALL" },
                { id: "U003", hp: "083344556677", pin: "123456", name: "Mama Kenzo Pratama", role: "KORLAS", school: "SDIT Al-Hikmah Bandung", classId: "C1A" },
                { id: "U004", hp: "084455667788", pin: "123456", name: "Ayah Razan Al-Fatih", role: "WALI_MURID", school: "SDIT Al-Hikmah Bandung", classId: "C1A" },
                { id: "U005", hp: "085566778899", pin: "123456", name: "Bunda Keysha Maulida", role: "WALI_MURID", school: "SDIT Al-Hikmah Bandung", classId: "C1A" }
            ],
            classes: [
                { id: "C1A", name: "Kelas 1-A (Ibnu Sina)", level: "1" },
                { id: "C1B", name: "Kelas 1-B (Ar-Razi)", level: "1" },

                { id: "T002", classId: "C1A", category: "Kegiatan", type: "IN", amount: 2500000, date: "2026-05-12", desc: "Donasi study tour Mini Zoo" },

            ],

                { id: "P001", parentId: "U004", parentName: "Ayah Razan Al-Fatih", amount: 150000, type: "Iuran Bulanan", proof: "https://placehold.co/400x600/e2e8f0/1e293b?text=Bukti+Transfer+150k", status: "PENDING", date: "2026-05-18", classId: "C1A" }
            ],
            announcements: [
                { id: "A001", author: "Komite Sekolah", target: "ALL", title: "Rapat Koordinasi Persiapan Akhir Tahun Ajaran", content: "Mengundang seluruh pengurus KORLAS Kelas 1-6 untuk menghadiri rapat pleno koordinasi program kerja akhir tahun pada hari Sabtu mendatang.", pin: true, date: "2026-05-16" },
                { id: "A002", author: "KORLAS 1-A", target: "C1A", title: "Rencana Kunjungan Edukasi (Mini Zoo)", content: "Ayah & Bunda sekalian, berikut detail anggaran kunjungan edukasi kelas 1-A. Harap segera konfirmasi keikutsertaan anak lewat modul voting.", pin: false, date: "2026-05-17" }
            ],

                { id: "E002", title: "Pentas Seni Kreativitas Anak", date: "2026-06-05", classId: "C1A", desc: "Pertunjukan tari dan drama kelas 1-A di aula sekolah." }
            ],

                { id: "V001", question: "Setujukan Anda kunjungan Edukasi 1-A bertempat di Jendela Alam Lembang?", options: ["Setuju", "Tidak Setuju", "Usulan Lain"], status: "ACTIVE", classId: "C1A" }
            ],
            votingResponses: [
                { id: "VR001", voteId: "V001", parentId: "U004", choice: "Setuju" }
            ],
            permissions: [
                { id: "PM001", parentId: "U004", studentName: "Razan Al-Fatih", type: "Sakit", desc: "Razan mengalami demam tinggi pasca imunisasi.", file: "https://placehold.co/400x600/e2e8f0/1e293b?text=Surat+Dokter", date: "2026-05-18", status: "PENDING", classId: "C1A" }
            ],
            logs: []
        };

        // Current Session Context
        let currentUser = null;
        let activeMenu = "dashboard";
        let mainChartInstance = null;
        let activeUserMgmtTab = "members"; // Track active sub-tab: 'members' or 'classes'
        document.addEventListener("DOMContentLoaded", async () => {
            AOS.init({ duration: 800, once: true });
            
            initTheme();
            
            // Load application dynamic branding configs
            await loadAppSettings();
            
            // Try loading session from LocalStorage
            const cachedUser = localStorage.getItem("imers_session");
            if (cachedUser) {
                currentUser = JSON.parse(cachedUser);
                renderDashboardLayout();
            } else {
                renderLoginScreen();
            }
            
            // Hide loading screen safely
            setTimeout(() => {
                document.getElementById("loading-screen").classList.add("opacity-0");
                setTimeout(() => document.getElementById("loading-screen").classList.add("hidden"), 300);
            }, 1000);
        });

        function initTheme() {
            const savedTheme = localStorage.getItem("imers_theme") || "light";
            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
            // Give icon a micro-moment to render in layout later
            setTimeout(() => updateThemeToggleIcon(savedTheme), 100);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.contains("dark");
            if (isDark) {
                document.documentElement.classList.remove("dark");
                localStorage.setItem("imers_theme", "light");
                updateThemeToggleIcon("light");
            } else {
                document.documentElement.classList.add("dark");
                localStorage.setItem("imers_theme", "dark");
                updateThemeToggleIcon("dark");
            }
            
            // Re-render dashboard chart to keep text styling consistent with dark/light themes
            if (activeMenu === 'dashboard' && document.getElementById('chart-cashflow-analytics')) {
                initDashboardChart();
            }
        }

        function updateThemeToggleIcon(theme) {
            const icon = document.getElementById("theme-toggle-icon");
            if (icon) {
                if (theme === "dark") {
                    icon.className = "fa-solid fa-sun text-sm text-amber-400";
                } else {
                    icon.className = "fa-solid fa-moon text-sm text-slate-500";
                }
            }
        }

        // Load configuration dynamically
        async function loadAppSettings() {
            if (IS_PREVIEW) {
                const savedSettings = localStorage.getItem("imers_settings");
                if (savedSettings) {
                    appSettings = JSON.parse(savedSettings);
                }
            } else {
                try {
                    const res = await safeFetch('getSettings');
                    if (res.success && res.data.status === 'success') {
                        appSettings = res.data.settings;
                    }
                } catch (e) {
                    console.error("Gagal memuat konfigurasi branding dari database:", e);
                }
            }
            // Update Loading Screen text
            document.getElementById("load-brand-name").innerText = appSettings.brandName;
            document.getElementById("load-brand-sub").innerText = appSettings.brandSub;
        }

        // Safe fetch helper handling JSON response & error notification
        async function safeFetch(action, payload = {}) {
            if (IS_PREVIEW) {
                // Emulate Server lag
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve({ success: true, data: mockServerRouter(action, payload) });
                    }, 500);
                });
            }
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, ...payload }),
                    headers: { 'Content-Type': 'application/json' }
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Koneksi Gagal',
                    text: 'Gagal terhubung ke server Google Apps Script. Cek status deployment Anda.',
                    confirmButtonColor: '#1e3a8a'
                });
                return { success: false, error: error.message };
            }
        }

        // Emulates Code.gs server-side response inside browser memory when IS_PREVIEW = true
        function mockServerRouter(action, payload) {
            console.log(`[PREVIEW DB EMULATOR] Request: ${action}`, payload);
            switch (action) {
                case 'login':
                    const user = mockDB.users.find(u => u.hp === payload.hp && u.pin === payload.pin);
                    if (user) return { status: 'success', user };
                    throw new Error("Nomor HP atau PIN salah!");
                    
                case 'forgotPin':
                    const foundUser = mockDB.users.find(u => u.hp === payload.hp);
                    if (foundUser) {
                        return { status: 'success', pin: foundUser.pin };
                    }
                    throw new Error("Nomor WhatsApp tidak terdaftar dalam sistem!");

                case 'changePin':
                    const uIdx = mockDB.users.findIndex(u => u.id === payload.userId);
                    if (uIdx > -1) {
                        if (mockDB.users[uIdx].pin !== payload.oldPin) {
                            throw new Error("PIN Lama yang Anda masukkan salah!");
                        }
                        mockDB.users[uIdx].pin = payload.newPin;
                        return { status: 'success' };
                    }
                    throw new Error("Sesi pengguna tidak valid!");

                case 'addUser':
                    const newUserObj = {
                        id: `U${String(mockDB.users.length + 1).padStart(3, '0')}`,
                        hp: payload.hp,
                        pin: payload.pin || "123456",
                        name: payload.name,
                        role: payload.role,
                        school: currentUser.school,
                        classId: payload.classId || "ALL"
                    };
                    mockDB.users.push(newUserObj);
                    return { status: 'success', user: newUserObj };

                case 'addClass':
                    const newClassObj = {
                        id: payload.classId,
                        name: payload.className,
                        level: payload.classLevel
                    };
                    mockDB.classes.push(newClassObj);
                    return { status: 'success', class: newClassObj };

                case 'getSettings':
                    return { status: 'success', settings: appSettings };

                case 'saveSettings':
                    appSettings = {
                        brandName: payload.brandName,
                        brandSub: payload.brandSub,
                        brandTagline: payload.brandTagline,
                        welcomeTitle: payload.welcomeTitle,
                        brandIcon: payload.brandIcon
                    };
                    localStorage.setItem("imers_settings", JSON.stringify(appSettings));
                    return { status: 'success' };

                case 'getFinanceSummary':
                    const inTotal = mockDB.transactions.filter(t => t.type === 'IN').reduce((a, b) => a + b.amount, 0);
                    const outTotal = mockDB.transactions.filter(t => t.type === 'OUT').reduce((a, b) => a + b.amount, 0);
                    return {
                        totalIncome: inTotal,
                        totalExpense: outTotal,
                        balance: inTotal - outTotal,
                        history: mockDB.transactions
                    };

                case 'submitPayment':
                    const newPay = {
                        id: `P${String(mockDB.payments.length + 1).padStart(3, '0')}`,
                        parentId: currentUser.id,
                        parentName: currentUser.name,
                        amount: Number(payload.amount),
                        type: payload.type,
                        proof: payload.proof || "https://placehold.co/400x600/e2e8f0/1e293b?text=Bukti+Dummy",
                        status: "PENDING",
                        date: new Date().toISOString().split('T')[0],
                        classId: currentUser.classId
                    };
                    mockDB.payments.push(newPay);
                    return { status: 'success', payment: newPay };

                case 'verifyPayment':
                    const payIdx = mockDB.payments.findIndex(p => p.id === payload.id);
                    if (payIdx > -1) {
                        mockDB.payments[payIdx].status = payload.status;
                        if (payload.status === "APPROVED") {
                            // Insert corresponding transaction
                            const newTx = {
                                id: `T${String(mockDB.transactions.length + 1).padStart(3, '0')}`,
                                classId: mockDB.payments[payIdx].classId,
                                category: mockDB.payments[payIdx].type,
                                type: 'IN',
                                amount: mockDB.payments[payIdx].amount,
                                date: new Date().toISOString().split('T')[0],
                                desc: `Iuran diverifikasi: ${mockDB.payments[payIdx].parentName}`
                            };
                            mockDB.transactions.push(newTx);
                        }
                        return { status: 'success' };
                    }
                    throw new Error("Pembayaran tidak ditemukan");

                case 'addTransaction':
                    const newTxObj = {
                        id: `T${String(mockDB.transactions.length + 1).padStart(3, '0')}`,
                        classId: payload.classId || currentUser.classId,
                        category: payload.category,
                        type: payload.type,
                        amount: Number(payload.amount),
                        date: payload.date || new Date().toISOString().split('T')[0],
                        desc: payload.desc
                    };
                    mockDB.transactions.push(newTxObj);
                    return { status: 'success' };

                case 'addAnnouncement':
                    const newAnn = {
                        id: `A${String(mockDB.announcements.length + 1).padStart(3, '0')}`,
                        author: currentUser.name,
                        target: payload.target,
                        title: payload.title,
                        content: payload.content,
                        pin: payload.pin || false,
                        date: new Date().toISOString().split('T')[0]
                    };
                    mockDB.announcements.unshift(newAnn);
                    return { status: 'success' };

                case 'submitPermission':
                    const newPerm = {
                        id: `PM${String(mockDB.permissions.length + 1).padStart(3, '0')}`,
                        parentId: currentUser.id,
                        studentName: payload.studentName,
                        type: payload.type,
                        desc: payload.desc,
                        file: payload.file || "https://placehold.co/400x600/e2e8f0/1e293b?text=Surat+Sakit",
                        date: new Date().toISOString().split('T')[0],
                        status: "PENDING",
                        classId: currentUser.classId
                    };
                    mockDB.permissions.push(newPerm);
                    return { status: 'success' };

                case 'submitVote':
                    const vResp = {
                        id: `VR${String(mockDB.votingResponses.length + 1).padStart(3, '0')}`,
                        voteId: payload.voteId,
                        parentId: currentUser.id,
                        choice: payload.choice
                    };
                    mockDB.votingResponses.push(vResp);
                    return { status: 'success' };

                case 'sendReportBroadcast':
                    // Emulated report transmission success
                    return { status: 'success' };

                default:
                    return { status: 'ok', message: 'No side effects in preview' };
            }
        }

                            <div class="flex items-center space-x-3 mb-8">

                            <p class="text-slate-400 text-sm mb-6">Silakan masuk menggunakan kredensial terdaftar Anda.</p>

                            <form id="login-form" class="space-y-5">
                                <div>
                                    <label class="block text-slate-300 text-sm font-medium mb-2">Nomor WhatsApp / HP</label>
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                                            <i class="fa-solid fa-phone"></i>
                                        </span>

                                    </div>

        async function handleForgotPin() {
            Swal.fire({
                title: 'Pulihkan PIN Keamanan',
                text: 'Masukkan nomor WhatsApp Anda yang terdaftar untuk menerima info PIN terdaftar.',
                input: 'tel',
                inputPlaceholder: 'Contoh: 081122334455',
                showCancelButton: true,
                confirmButtonText: 'Kirim via WhatsApp',
                confirmButtonColor: '#3b7eff',
                cancelButtonText: 'Batal',
                preConfirm: (hp) => {
                    if (!hp) {
                        Swal.showValidationMessage('Nomor WhatsApp wajib diisi!');
                    }
                    return hp;
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
                    const res = await safeFetch('forgotPin', { hp: result.value });
                    if (res.success && res.data.status === 'success') {
                        let infoMsg = 'PIN keamanan Anda telah dikirim secara otomatis via WhatsApp Fonnte.';
                        if (IS_PREVIEW) {
                            infoMsg += `<br><br><span class="text-xs font-bold text-amber-600 bg-amber-50 p-2 rounded-lg inline-block border border-amber-200">Kunci PIN Demo Anda: ${res.data.pin}</span>`;
                        }
                        Swal.fire({
                            icon: 'success',
                            title: 'Proses Berhasil',
                            html: infoMsg,
                            confirmButtonColor: '#1e3a8a'
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Pencarian Gagal',
                            text: res.data?.message || 'Nomor WhatsApp Anda tidak dikenali oleh sistem.',
                            confirmButtonColor: '#1e3a8a'

                    }
                }
            });
        }

        function getDynamicGreetingAndQuote() {
            const hours = new Date().getHours();
            let greeting = "";
            let quote = "";
            
            const quotes = {
                pagi: [
                    "Setiap pagi adalah kesempatan baru untuk menjadi orang tua terbaik bagi anak-anak kita. Tetap semangat mendampingi tumbuh kembang buah hati!",
                    "Mulailah hari dengan senyuman dan niat tulus. Keberhasilan anak dimulai dari kehangatan serta dukungan penuh keluarga di pagi hari."
                ],
                siang: [
                    "Di tengah padatnya aktivitas siang ini, luangkan waktu sejenak untuk mengingat bahwa pelukan hangat Anda adalah rumah ternyaman bagi mereka.",
                    "Pendidikan karakter anak adalah kerja sama berkelanjutan. Terima kasih atas kepedulian dan dedikasi luar biasa Anda siang ini!"
                ],
                sore: [
                    "Sore hari adalah momen indah untuk pulang, mendengar tawa mereka, dan merayakan pencapaian-pencapaian kecil buah hati kita hari ini.",
                    "Kehangatan berkumpul bersama keluarga di sore hari adalah obat terbaik untuk memulihkan seluruh lelah aktivitas harian."
                ],
                malam: [
                    "Malam yang tenang adalah waktu terbaik untuk merenung dan mensyukuri setiap benih kebaikan yang berhasil kita tanam bersama hari ini.",
                    "Istirahatlah dengan damai malam ini. Esok hari kita kembali melangkah bersama demi masa depan yang lebih cerah bagi anak-anak kita."
                ]
            };

            if (hours >= 4 && hours < 11) {
                greeting = "Selamat Pagi";
                quote = quotes.pagi[Math.floor(Math.random() * quotes.pagi.length)];
            } else if (hours >= 11 && hours < 15) {
                greeting = "Selamat Siang";
                quote = quotes.siang[Math.floor(Math.random() * quotes.siang.length)];
            } else if (hours >= 15 && hours < 18) {
                greeting = "Selamat Sore";
                quote = quotes.sore[Math.floor(Math.random() * quotes.sore.length)];
            } else {
                greeting = "Selamat Malam";
                quote = quotes.malam[Math.floor(Math.random() * quotes.malam.length)];
            }

            return { greeting, quote };
        }

        // Initialize Cashflow ChartJS Graphically
        function initDashboardChart() {
            const canvas = document.getElementById('chart-cashflow-analytics');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (mainChartInstance) {
                mainChartInstance.destroy();
            }

            // Extract values
            const txs = mockDB.transactions;
            const labels = txs.map(t => t.date);
            const inData = txs.map(t => t.type === 'IN' ? t.amount : 0);
            const outData = txs.map(t => t.type === 'OUT' ? t.amount : 0);

            const isDark = document.documentElement.classList.contains("dark");
            const textColor = isDark ? '#cbd5e1' : '#475569';
            const gridColor = isDark ? '#1e293b' : '#f1f5f9';

            mainChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Pemasukan (IN)',
                            data: inData,
                            backgroundColor: '#10b981',
                            borderRadius: 6
                        },
                        {
                            label: 'Pengeluaran (OUT)',
                            data: outData,
                            backgroundColor: '#f43f5e',
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'top', 
                            labels: { 
                                boxWidth: 12, 
                                color: textColor,
                                font: { family: 'Inter', size: 10 } 
                            } 
                        }
                    },
                    scales: {
                        y: { 
                            ticks: { color: textColor, font: { family: 'Inter', size: 9 } }, 
                            grid: { color: gridColor, drawBorder: false } 
                        },
                        x: { 
                            ticks: { color: textColor, font: { family: 'Inter', size: 9 } }, 
                            grid: { display: false } 
                        }
                    }
                }
            });
        }

        // Helper fungsi logika cerdas untuk auto-toggle dropdown kelas di dalam pop-up
        function handleRoleSelectionChange(role) {
            const classSelect = document.getElementById("modal-user-class");
            if (!classSelect || currentUser.role === 'KORLAS') return;

            if (role === 'SUPER_ADMIN' || role === 'KOMITE') {
                classSelect.value = "ALL";
                classSelect.disabled = true;
                classSelect.parentElement.classList.add("opacity-50", "cursor-not-allowed");
            } else {
                classSelect.disabled = false;
                if (classSelect.value === "ALL" && mockDB.classes.length > 0) {
                    classSelect.value = mockDB.classes[0].id; 
                }
                classSelect.parentElement.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Nomor Terkoneksi (Device)</label>
                                    <input type="tel" value="081234567890" disabled
                                        class="w-full p-2.5 bg-slate-100 border rounded-xl text-xs text-slate-500">
                                </div>
                                <button onclick="saveAPIConfig()" class="bg-primary-600 hover:bg-primary-500 text-white font-bold text-xs py-2.5 px-4 rounded-xl shadow-md transition-colors w-full">
                                    Simpan Perubahan API
                                </button>
                            </div>
                        </div>

                        <!-- Right Panel Branding Config -->
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-5">
                            <h5 class="text-slate-800 font-extrabold text-sm border-b pb-3"><i class="fa-solid fa-paint-roller text-primary-500 mr-2 text-base"></i> Branding & Kustomisasi Tampilan</h5>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Nama Brand Utama</label>
                                    <input type="text" id="cfg-brand-name" value="${appSettings.brandName}" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs">
                                </div>
                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Subheadline Brand (Deskripsi Singkat)</label>
                                    <input type="text" id="cfg-brand-sub" value="${appSettings.brandSub}" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs">
                                </div>
                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Headline Tagline Login (Gunakan &lt;br&gt; untuk baris baru)</label>
                                    <textarea id="cfg-brand-tagline" rows="2" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs">${appSettings.brandTagline}</textarea>
                                </div>
                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Judul Sambutan Login (Selamat Datang)</label>
                                    <input type="text" id="cfg-welcome-title" value="${appSettings.welcomeTitle}" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs">
                                </div>
                                <div>
                                    <label class="block text-slate-700 font-bold text-xs mb-1.5">Class Icon FontAwesome (Logo Utama)</label>
                                    <div class="flex items-center space-x-2">
                                        <input type="text" id="cfg-brand-icon" value="${appSettings.brandIcon}" oninput="updateBrandIconPreview(this.value)" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-mono">
                                        <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-700 border" id="icon-preview-box">
                                            <i class="fa-solid ${appSettings.brandIcon}"></i>
                                        </div>
                                    </div>
                                </div>
                                <button onclick="saveBrandingConfig()" class="bg-primary-600 hover:bg-primary-500 text-white font-bold text-xs py-2.5 px-4 rounded-xl shadow-md transition-colors w-full">
                                    Simpan Perubahan Branding
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Live changes visualization in admin dashboard config
        function updateBrandIconPreview(val) {
            const box = document.getElementById('icon-preview-box');
            if (box) {
                box.innerHTML = `<i class="fa-solid ${val || 'fa-question'}"></i>`;
            }
        }

        // Action to save dynamic branding config into storage
        async function saveBrandingConfig() {
            const brandName = document.getElementById("cfg-brand-name").value;
            const brandSub = document.getElementById("cfg-brand-sub").value;
            const brandTagline = document.getElementById("cfg-brand-tagline").value;
            const welcomeTitle = document.getElementById("cfg-welcome-title").value;
            const brandIcon = document.getElementById("cfg-brand-icon").value;

            Swal.fire({ title: 'Menyimpan konfigurasi branding...', didOpen: () => Swal.showLoading() });

            if (IS_PREVIEW) {
                appSettings = { brandName, brandSub, brandTagline, welcomeTitle, brandIcon };
                localStorage.setItem("imers_settings", JSON.stringify(appSettings));
                setTimeout(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Konfigurasi Branding Berhasil Disimpan',
                        text: 'Tampilan aplikasi & login diperbarui secara real-time!',
                        confirmButtonColor: '#1e3a8a'
                    }).then(() => {
                        location.reload(); // Reload page to cleanly propagate changes
                    });
                }, 500);
            } else {
                const res = await safeFetch('saveSettings', { brandName, brandSub, brandTagline, welcomeTitle, brandIcon });
                if (res.success && res.data.status === 'success') {
                    appSettings = { brandName, brandSub, brandTagline, welcomeTitle, brandIcon };
                    Swal.fire({
                        icon: 'success',
                        title: 'Konfigurasi Branding Berhasil Disimpan',
                        text: 'Tampilan aplikasi & login diperbarui secara real-time!',
                        confirmButtonColor: '#1e3a8a'
                    }).then(() => {
                        location.reload();
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Menyimpan',
                        text: res.data?.message || 'Terjadi kesalahan sistem.',
                        confirmButtonColor: '#1e3a8a'
                    });
                }
            }
        }

        function saveAPIConfig() {
            Swal.fire({
                icon: 'success',
                title: 'Konfigurasi Disimpan',
                text: 'Konektivitas Token API Fonnte telah diperbarui secara aman.',
                confirmButtonColor: '#1e3a8a'
            });
        }

        function renderSecuritySettings() {
            const main = document.getElementById("main-content-flow");
            main.innerHTML = `
                <div class="max-w-xl mx-auto space-y-6" data-aos="fade-up">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-5">
                        <div class="flex items-center space-x-3 border-b border-slate-100 pb-4">
                            <div class="w-10 h-10 rounded-xl bg-primary-100 text-primary-600 flex items-center justify-center text-lg">
                                <i class="fa-solid fa-key"></i>
                            </div>
                            <div>
                                <h4 class="text-slate-900 font-extrabold text-sm">Ganti PIN Keamanan</h4>
                                <p class="text-slate-500 text-2xs">Ganti PIN 6-digit lama Anda secara berkala demi keamanan akun.</p>
                            </div>
                        </div>

                        <form id="change-pin-form" class="space-y-4 text-xs">
                            <div>
                                <label class="block text-slate-700 font-bold mb-1.5">PIN Lama</label>
                                <input type="password" id="pin-old" maxlength="6" required placeholder="******"
                                    class="w-full p-2.5 bg-slate-50 border rounded-xl tracking-widest text-center text-sm font-mono focus:outline-none focus:border-primary-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 font-bold mb-1.5">PIN Baru (6 Digit Angka)</label>
                                <input type="password" id="pin-new" maxlength="6" required placeholder="******"
                                    class="w-full p-2.5 bg-slate-50 border rounded-xl tracking-widest text-center text-sm font-mono focus:outline-none focus:border-primary-500">
                            </div>
                            <div>
                                <label class="block text-slate-700 font-bold mb-1.5">Konfirmasi PIN Baru</label>
                                <input type="password" id="pin-confirm" maxlength="6" required placeholder="******"
                                    class="w-full p-2.5 bg-slate-50 border rounded-xl tracking-widest text-center text-sm font-mono focus:outline-none focus:border-primary-500">
                            </div>
                            <button type="submit" class="w-full bg-primary-600 hover:bg-primary-500 text-white font-bold py-2.5 rounded-xl transition-all shadow-md shadow-primary-500/15">
                                Perbarui PIN Keamanan
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById("change-pin-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                const oldPin = document.getElementById("pin-old").value;
                const newPin = document.getElementById("pin-new").value;
                const pinConfirm = document.getElementById("pin-confirm").value;

                if (newPin.length !== 6 || isNaN(newPin)) {
                    Swal.fire({ icon: 'error', title: 'Format Salah', text: 'PIN baru harus terdiri atas 6 digit angka!', confirmButtonColor: '#1e3a8a' });
                    return;
                }

                if (newPin !== pinConfirm) {
                    Swal.fire({ icon: 'error', title: 'Ketidakcocokan', text: 'Konfirmasi PIN baru tidak cocok!', confirmButtonColor: '#1e3a8a' });
                    return;
                }

                Swal.fire({ title: 'Menyimpan PIN baru...', didOpen: () => Swal.showLoading() });
                const res = await safeFetch('changePin', { userId: currentUser.id, oldPin, newPin });
                if (res.success && res.data.status === 'success') {
                    currentUser.pin = newPin;
                    localStorage.setItem("imers_session", JSON.stringify(currentUser));
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Perubahan Disimpan',
                        text: 'PIN Keamanan Anda berhasil diganti.',
                        confirmButtonColor: '#1e3a8a'
                    });
                    document.getElementById("change-pin-form").reset();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Verifikasi Gagal',
                        text: res.data?.message || res.error || 'Terjadi kesalahan.',
                        confirmButtonColor: '#1e3a8a'
                    });
                }
            });
        }

        // Logout Action
        function handleLogout() {
            Swal.fire({
                title: 'Konfirmasi Keluar',
                text: 'Apakah Anda yakin ingin keluar dari platform iMersKORLAS?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya, Keluar',
                confirmButtonColor: '#f43f5e',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem("imers_session");
                    currentUser = null;
                    renderLoginScreen();
                }
            });
        }
    </script>
</body>
</html>
